name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check engine/

      - name: Check formatting with black
        run: uv run black --check engine/

      - name: Run tests
        env:
          # Dummy credentials so config validation passes; tests must not hit Alpaca
          ALPACA_API_KEY: test_key
          ALPACA_SECRET_KEY: test_secret
          MODE: paper
        run: uv run pytest tests/ -v --tb=short

  ios-build:
    name: iOS Build Check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build iOS app (no signing)
        run: |
          xcodebuild build \
            -project ios/EdgeAI.xcodeproj \
            -scheme EdgeAI \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
